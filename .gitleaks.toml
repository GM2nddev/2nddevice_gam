title = "Gitleaks config"

[allowlist]
description = "Global allowlist"
paths = [
    '''gitleaks.toml''',
]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-]{20,})['"]?'''
tags = ["key", "api"]

[[rules]]
id = "generic-secret"
description = "Generic Secret"
regex = '''(?i)(secret|password|passwd|token|credentials?)[\s]*[=:]\s*['"]?([a-zA-Z0-9_\-/+=]{8,})['"]?'''
tags = ["secret", "password"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "google-service-account"
description = "Google Service Account Key"
regex = '''"type"\s*:\s*"service_account"'''
tags = ["google", "service-account"]
